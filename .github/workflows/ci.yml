name: QA Automation CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  api-and-quality-checks:
    name: API tests and Python checks
    runs-on: ubuntu-latest

    env:
      REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate Python syntax
        run: python -m compileall pages utils tests conftest.py

      - name: Run API tests
        run: python -m pytest tests/api -m api --html=reports/api-report.html --self-contained-html

      - name: Upload API HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/api-report.html

  ui-tests:
    name: UI tests with Chrome
    runs-on: ubuntu-latest
    needs: api-and-quality-checks

    env:
      REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run UI tests
        run: python -m pytest tests/ui -m ui --html=reports/ui-report.html --self-contained-html

      - name: Upload UI HTML report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: |
            reports/ui-report.html
            reports/screenshots/
